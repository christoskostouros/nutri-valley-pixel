backend:
  name: git-gateway
  branch: main

media_folder: public/img
public_folder: /img

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Featured Image, name: image, widget: image }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Body, name: body, widget: markdown }

  - name: recipes
    label: Recipes
    folder: src/content/recipes
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Category, name: category, widget: string }
      - { label: Prep Time, name: prep_time, widget: string }
      - { label: Ingredients, name: ingredients, widget: markdown }
      - { label: Instructions, name: body, widget: markdown }

  - name: products
    label: Products
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: title, widget: string }
      - { label: Category, name: category, widget: select, options: ["Ενήλικες", "Παιδικά"] }
      - { label: Subcategory, name: subcategory, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Description, name: body, widget: markdown }

  - name: events
    label: Events
    folder: src/content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Location, name: location, widget: string }
      - { label: Image, name: image, widget: image }
      - { label: Description, name: body, widget: markdown }

  - name: site-settings
    label: Site Settings
    files:
      - label: General
        name: general
        file: src/content/settings/general.json
        fields:
          - { label: Site Title, name: title, widget: string }
          - { label: Site Description, name: description, widget: text }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Address, name: address, widget: string }
